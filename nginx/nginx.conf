events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Disk-backed cache for Next.js static assets (content-hashed, safe to cache long-term)
    proxy_cache_path /var/cache/nginx levels=1:2
        keys_zone=static_cache:10m max_size=500m
        inactive=60m use_temp_path=off;

    # Gzip compression for text-based responses
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    server {
        listen 80;
        server_name _;

        # Suppress nginx version from Server header and error pages
        server_tokens off;

        # Security headers applied to all responses through this server block
        add_header X-Content-Type-Options  "nosniff"                        always;
        add_header X-Frame-Options         "DENY"                           always;
        add_header X-XSS-Protection        "1; mode=block"                  always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        proxy_hide_header X-Powered-By;

        # Allow document uploads up to 25 MB
        client_max_body_size 25M;

        # SSE streaming endpoint — must come before the generic /api/ block.
        # Caching and buffering are both disabled; tokens flow to the browser immediately.
        location ~* /api/chat-threads/.*/messages/stream {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        '';
            proxy_buffering    off;
            proxy_cache        off;
            proxy_no_cache     1;
            proxy_read_timeout    300s;
            proxy_connect_timeout  10s;
            proxy_send_timeout    300s;
            chunked_transfer_encoding on;
            add_header Cache-Control    "no-store";
            add_header X-Accel-Buffering "no";
        }

        # Backend API — never cached
        location /api/ {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_cache        off;
            proxy_no_cache     1;
            # Generous timeouts for LLM/RAG responses which can take 30-60 s
            proxy_read_timeout    120s;
            proxy_connect_timeout  10s;
            proxy_send_timeout    120s;
            add_header Cache-Control "no-store";
        }

        # FastAPI auto-generated docs
        location /docs {
            proxy_pass http://backend:8000/docs;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        location /openapi.json {
            proxy_pass http://backend:8000/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        location /redoc {
            proxy_pass http://backend:8000/redoc;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # Backend health check — exposed through nginx for external probes
        location /health {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # Next.js static chunks — content-hashed filenames, safe to cache for 1 year
        location /_next/static/ {
            proxy_pass         http://frontend:3000;
            proxy_cache        static_cache;
            proxy_cache_valid  200 365d;
            proxy_cache_use_stale error timeout updating;
            add_header Cache-Control  "public, max-age=31536000, immutable";
            add_header X-Cache-Status $upstream_cache_status;
        }

        # Everything else — proxied to the Next.js standalone server
        location / {
            proxy_pass         http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Required for Next.js HMR websocket in dev; harmless in production
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }
}
