events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Gzip compression for text-based responses
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    server {
        listen 80;
        server_name _;

        # Allow document uploads up to 25 MB
        client_max_body_size 25M;

        # SSE streaming endpoint — must come before the generic /api/ block.
        # proxy_buffering off ensures tokens flow to the browser immediately.
        location ~ ^/api/chat-threads/[^/]+/messages/stream {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_buffering    off;
            proxy_read_timeout    300s;
            proxy_connect_timeout  10s;
            proxy_send_timeout    300s;
        }

        # Backend API — proxied to the FastAPI container
        location /api/ {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            # Generous timeouts for LLM/RAG responses which can take 30-60 s
            proxy_read_timeout    120s;
            proxy_connect_timeout  10s;
            proxy_send_timeout    120s;
        }

        # FastAPI auto-generated docs
        location /docs {
            proxy_pass http://backend:8000/docs;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        location /openapi.json {
            proxy_pass http://backend:8000/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        location /redoc {
            proxy_pass http://backend:8000/redoc;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # Backend health check — exposed through nginx for external probes
        location /health {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # Everything else — proxied to the Next.js standalone server
        location / {
            proxy_pass         http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Required for Next.js HMR websocket in dev; harmless in production
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }
}
